<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CC 選物代購 - 工作人員後台</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #F5F3EF; font-family: 'PingFang TC','Noto Sans TC',sans-serif; min-height: 100vh; }
.header { background: #1A1A2E; padding: 20px 24px; border-bottom: 3px solid #E8A87C; }
.header-eyebrow { font-size: 10px; letter-spacing: 4px; color: #E8A87C; margin-bottom: 4px; }
.header h1 { color: #fff; font-size: 22px; font-weight: 700; }
.header p { color: #A0A0B8; font-size: 12px; margin-top: 4px; }
.tabs { background: #1A1A2E; border-bottom: 1px solid #2E2E45; }
.tabs-inner { max-width: 900px; margin: 0 auto; display: flex; }
.tab-btn { background: transparent; border: none; border-bottom: 2px solid transparent; cursor: pointer; padding: 12px 18px; font-size: 13px; font-weight: 600; color: #A0A0B8; font-family: inherit; }
.tab-btn.active { color: #E8A87C; border-bottom-color: #E8A87C; }
.main { max-width: 900px; margin: 0 auto; padding: 24px 16px; }
.card { background: #fff; border-radius: 12px; overflow: hidden; border: 1px solid #E8E4DF; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 14px; }
.card-header { padding: 14px 18px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
.card-header:hover { background: #FAFAF8; }
.card-body { border-top: 1px solid #F0EDEA; }
.item-row { padding: 14px 18px; border-bottom: 1px solid #F5F3EF; background: #FAFAF8; }
.item-top { display: flex; gap: 12px; align-items: flex-start; margin-bottom: 10px; }
.thumb { width: 64px; height: 64px; object-fit: cover; border-radius: 8px; border: 1px solid #E0DCD8; flex-shrink: 0; }
.no-thumb { width: 64px; height: 64px; background: #F0EDEA; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #CCC; flex-shrink: 0; }
.item-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.field-label { font-size: 11px; color: #6B6B80; margin-bottom: 4px; }
.field-value { font-size: 13px; color: #1A1A2E; padding: 8px 0; border-bottom: 1px solid #F0EDEA; }
input, select { width: 100%; border: 1.5px solid #E8A87C; border-radius: 6px; padding: 8px 10px; font-size: 13px; color: #1A1A2E; background: #FFFEF9; outline: none; font-family: inherit; }
.order-footer-section { padding: 14px 18px; }
.footer-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.total-row { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #F0EDEA; padding-top: 12px; margin-top: 4px; }
.btn-edit { background: transparent; border: 1.5px solid #1A1A2E; border-radius: 7px; color: #1A1A2E; font-size: 12px; padding: 6px 14px; cursor: pointer; font-family: inherit; font-weight: 600; }
.btn-save { background: #1A1A2E; color: #E8A87C; border: none; border-radius: 7px; padding: 8px 18px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
.btn-cancel { background: transparent; color: #6B6B80; border: 1.5px solid #DDD8D0; border-radius: 7px; padding: 8px 14px; font-size: 13px; cursor: pointer; font-family: inherit; }
.btn-delete { background: transparent; border: 1px solid #E0BCBC; border-radius: 6px; color: #D64045; font-size: 12px; padding: 6px 12px; cursor: pointer; font-family: inherit; }
.btn-refresh { background: #1A1A2E; color: #E8A87C; border: none; border-radius: 7px; padding: 8px 18px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
.status-badge { display: inline-block; border-radius: 6px; padding: 3px 10px; font-size: 11px; font-weight: 600; }
.badge { background: #E8A87C; color: #1A1A2E; border-radius: 20px; padding: 2px 10px; font-size: 12px; font-weight: 700; margin-left: 8px; }
.edit-bar { display: flex; gap: 8px; align-items: center; padding: 10px 18px; background: #FEF9F4; border-top: 1px solid #F0EDEA; }
.edit-notice { font-size: 12px; color: #8B6A3E; flex: 1; }
.picking-card { background: #fff; border-radius: 12px; overflow: hidden; border: 1px solid #E8E4DF; margin-bottom: 14px; }
.picking-header { background: #1A1A2E; padding: 12px 18px; display: flex; justify-content: space-between; }
.picking-item { padding: 12px 18px; border-bottom: 1px solid #F0EDEA; display: flex; gap: 12px; align-items: center; }
.picking-item:last-child { border-bottom: none; }
.picking-item:nth-child(even) { background: #FAFAF8; }
.qty-badge { background: #F5F3EF; border: 1.5px solid #E8A87C; border-radius: 8px; padding: 6px 12px; text-align: center; flex-shrink: 0; }
.shipping-card { background: #fff; border-radius: 12px; overflow: hidden; border: 1px solid #E8E4DF; margin-bottom: 16px; }
.shipping-header { background: #1A1A2E; padding: 12px 18px; display: flex; align-items: center; justify-content: space-between; }
.shipping-item { padding: 12px 18px; border-bottom: 1px solid #F0EDEA; display: flex; gap: 14px; align-items: center; }
.shipping-footer { padding: 12px 18px; background: #FAFAF8; }
.avatar { width: 32px; height: 32px; border-radius: 50%; background: #E8A87C; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; color: #1A1A2E; flex-shrink: 0; }
.empty { text-align: center; color: #B0AAA4; font-size: 14px; padding: 48px 0; }
.loading-text { text-align: center; color: #A0A0B8; font-size: 13px; padding: 32px 0; }
.save-success { color: #2E7D32; font-size: 12px; }
.print-header { display: none; }
@media print {
  .header, .tabs, .card, .btn-save, .btn-delete, .btn-edit, .btn-cancel, .btn-refresh, #orders-tab { display: none !important; }
  body.print-picking #shipping-tab, body.print-picking .shipping-top { display: none !important; }
  body.print-picking #picking-tab { display: block !important; }
  body.print-picking #picking-tab > div:first-child { display: none !important; }
  body.print-shipping #picking-tab { display: none !important; }
  body.print-shipping #shipping-tab { display: block !important; }
  body.print-shipping .shipping-top { display: none !important; }
  .main { padding: 0; }
  .print-header { display: block; text-align: center; padding: 16px 0 20px; border-bottom: 3px solid #E8A87C; margin-bottom: 20px; }
  .print-header h2 { font-size: 22px; font-weight: 700; color: #1A1A2E; margin-bottom: 4px; }
  .print-header p { font-size: 12px; color: #6B6B80; }
  .shipping-card { box-shadow: none; border: 1px solid #ccc; break-inside: avoid; margin-bottom: 16px; }
  .shipping-header { background: #1A1A2E !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .shipping-footer { background: #FAFAF8 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  input[type=checkbox] { display: none !important; }
}
</style>
</head>
<body>
<div class="header">
  <div style="max-width:900px;margin:0 auto">
    <div class="header-eyebrow">工作人員後台</div>
    <h1>CC 選物代購</h1>
    <p>訂單管理系統</p>
  </div>
</div>
<div class="tabs">
  <div class="tabs-inner">
    <button class="tab-btn active" onclick="switchTab('orders')">📋 訂單列表</button>
    <button class="tab-btn" onclick="switchTab('picking')">📦 揀貨單</button>
    <button class="tab-btn" onclick="switchTab('shipping')">🚚 出貨單</button>
  </div>
</div>

<div class="main">
  <div id="orders-tab">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div style="font-weight:700;color:#1A1A2E;font-size:15px">所有訂單<span class="badge" id="order-count">0</span></div>
      <button class="btn-refresh" onclick="loadAll()">🔄 重新整理</button>
    </div>
    <div class="loading-text" id="loading-orders">載入中…</div>
    <div id="orders-list"></div>
  </div>

  <div id="picking-tab" style="display:none">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div style="font-weight:700;color:#1A1A2E;font-size:15px">揀貨單</div>
      <button class="btn-refresh" onclick="printPicking()">🖨 列印揀貨單</button>
    </div>
    <div id="picking-list"></div>
  </div>

  <div id="shipping-tab" style="display:none">
    <div class="print-header">
      <h2>CC 選物代購</h2>
      <p>出貨單</p>
    </div>
    <div class="shipping-top" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div style="font-weight:700;color:#1A1A2E;font-size:15px">出貨單</div>
      <button class="btn-refresh" onclick="printShipping()">🖨 列印勾選</button>
    </div>
    <div id="shipping-list"></div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://zwabpiysvlqvqunauwyj.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp3YWJwaXlzdmxxdnF1bmF1d3lqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxMTA1MzgsImV4cCI6MjA5NzY4NjUzOH0.-jx1ikazqqKRta-8lEoifeKR9bVVm_E00m4e17q_6z8';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const STATUS_OPTIONS = [
  { value:'pending', label:'處理中', color:'#A0A0B8', bg:'#F0F0F8' },
  { value:'success', label:'採購成功', color:'#2E7D32', bg:'#E8F5E9' },
  { value:'outofstock', label:'斷貨', color:'#D64045', bg:'#FFEBEE' },
  { value:'preparing', label:'出貨準備中', color:'#E65100', bg:'#FFF3E0' },
  { value:'done', label:'已完成', color:'#1565C0', bg:'#E3F2FD' },
];

let allCustomers = [];
let allItems = [];
let expanded = null;
let editingOrder = null; // 哪個訂單在編輯中
let editingItems = {}; // 暫存編輯中的 item 資料
let editingCustomer = {}; // 暫存編輯中的 customer 資料

async function loadAll() {
  document.getElementById('loading-orders').style.display = 'block';
  const { data: customers } = await sb.from('customers').select('*').order('created_at', { ascending: false });
  const { data: items } = await sb.from('order_items').select('*').order('created_at', { ascending: true });
  allCustomers = customers || [];
  allItems = items || [];
  editingOrder = null;
  document.getElementById('loading-orders').style.display = 'none';
  document.getElementById('order-count').textContent = allCustomers.length;
  renderOrders();
  renderPicking();
  renderShipping();
}

function getCustomerItems(customerId) {
  return allItems.filter(it => it.customer_id === customerId);
}

function calcTotal(customer, items) {
  const itemsTotal = items.reduce((s, it) => {
    if (it.status === 'outofstock') return s; // 斷貨不計入
    const twd = (it.price_twd && it.price_twd > 0) ? it.price_twd : (it.price_jpy * (it.rate||0));
    return s + twd * it.qty;
  }, 0);
  return itemsTotal + (Number(customer.shipping)||0) + (Number(customer.extra)||0) - (Number(customer.discount)||0);
}

function getStatusOpt(status) {
  return STATUS_OPTIONS.find(s => s.value === status) || STATUS_OPTIONS[0];
}

function startEdit(customerId) {
  editingOrder = customerId;
  const c = allCustomers.find(c => c.id === customerId);
  const items = getCustomerItems(customerId);
  editingCustomer = { shipping: c.shipping||0, extra: c.extra||0, discount: c.discount||0, note: c.note||'' };
  editingItems = {};
  items.forEach(it => {
    editingItems[it.id] = { rate: it.rate||0, status: it.status||'pending', vendor: it.vendor||'', price_twd: it.price_twd||0 };
  });
  renderOrders();
}

function cancelEdit() {
  editingOrder = null;
  editingItems = {};
  editingCustomer = {};
  renderOrders();
}

async function saveEdit(customerId) {
  const btn = document.getElementById(`save-btn-${customerId}`);
  if (btn) { btn.disabled = true; btn.textContent = '儲存中…'; }

  // Save customer fields
  await sb.from('customers').update({
    shipping: editingCustomer.shipping,
    extra: editingCustomer.extra,
    discount: editingCustomer.discount,
    note: editingCustomer.note,
  }).eq('id', customerId);

  // Save item fields
  for (const [itemId, data] of Object.entries(editingItems)) {
    await sb.from('order_items').update({
      rate: data.rate,
      status: data.status,
    }).eq('id', Number(itemId));
  }

  // Update local data
  const cIdx = allCustomers.findIndex(c => c.id === customerId);
  if (cIdx !== -1) {
    allCustomers[cIdx].shipping = editingCustomer.shipping;
    allCustomers[cIdx].extra = editingCustomer.extra;
    allCustomers[cIdx].discount = editingCustomer.discount;
    allCustomers[cIdx].note = editingCustomer.note;
  }
  for (const [itemId, data] of Object.entries(editingItems)) {
    const iIdx = allItems.findIndex(it => it.id === Number(itemId));
    if (iIdx !== -1) {
      allItems[iIdx].rate = data.rate;
      allItems[iIdx].status = data.status;
      allItems[iIdx].price_twd = data.price_twd;
    }
  }

  editingOrder = null;
  editingItems = {};
  editingCustomer = {};
  renderOrders();
  renderShipping();
}

async function deleteOrder(customerId) {
  const pwd = prompt('請輸入刪除密碼：');
  if (pwd !== '888') { alert('密碼錯誤！'); return; }
  await sb.from('customers').delete().eq('id', customerId);
  allCustomers = allCustomers.filter(c => c.id !== customerId);
  allItems = allItems.filter(it => it.customer_id !== customerId);
  expanded = null; editingOrder = null;
  renderOrders(); renderPicking(); renderShipping();
}

function renderOrders() {
  const container = document.getElementById('orders-list');
  if (!allCustomers.length) { container.innerHTML = '<div class="empty">尚無訂單</div>'; return; }

  container.innerHTML = allCustomers.map(c => {
    const items = getCustomerItems(c.id);
    const isOpen = expanded === c.id;
    const isEditing = editingOrder === c.id;
    const total = calcTotal(
      isEditing ? { ...c, ...editingCustomer } : c,
      isEditing ? items.map(it => ({ ...it, ...(editingItems[it.id]||{}) })) : items
    );

    return `<div class="card">
      <div class="card-header" onclick="toggleExpand(${c.id})">
        <div>
          <div style="font-weight:700;color:#1A1A2E;font-size:14px">${esc(c.order_no)}</div>
          <div style="font-size:12px;color:#6B6B80;margin-top:3px">${esc(c.nickname)}・${esc(c.phone)}・${c.created_at?.slice(0,16)}</div>
        </div>
        <div style="display:flex;align-items:center;gap:12px">
          ${total > 0 ? `<div style="font-weight:700;color:#E8A87C;font-size:14px">NT$${Math.round(total).toLocaleString()}</div>` : ''}
          <div style="color:#A0A0B8;font-size:16px">${isOpen ? '▲' : '▼'}</div>
        </div>
      </div>

      ${isOpen ? `<div class="card-body">
        ${items.map(it => {
          const editing = isEditing ? (editingItems[it.id] || {}) : {};
          const rate = isEditing ? editing.rate : it.rate;
          const status = isEditing ? editing.status : it.status;
          const twd = rate ? Math.round(it.price_jpy * rate * it.qty) : 0;
          const sOpt = getStatusOpt(status);
          return `<div class="item-row">
            <div class="item-top">
              ${it.image_url ? `<img src="${esc(it.image_url)}" class="thumb">` : '<div class="no-thumb">無圖</div>'}
              <div style="flex:1">
                <div style="font-weight:700;color:#1A1A2E;font-size:14px;margin-bottom:4px">${esc(it.name)}</div>
                <div style="font-size:12px;color:#6B6B80">${it.size?esc(it.size)+'　':''}數量：${it.qty}　¥${(it.price_jpy||0).toLocaleString()}</div>
                <span class="status-badge" style="background:${sOpt.bg};color:${sOpt.color}">${sOpt.label}</span>
              </div>
              ${twd > 0 ? `<div style="font-weight:700;color:#1A1A2E;font-size:14px;flex-shrink:0">NT$${twd.toLocaleString()}</div>` : ''}
            </div>
            ${isEditing ? `
            <div class="item-grid">
              <div>
                <div class="field-label">匯率（¥1 = NT$?）</div>
                <input type="number" step="0.01" value="${rate||''}" placeholder="如：0.22"
                  oninput="editingItems[${it.id}].rate = parseFloat(this.value)||0; rerenderTotal(${c.id})">
              </div>
              <div>
                <div class="field-label">商品狀態</div>
                <select onchange="editingItems[${it.id}].status = this.value; rerenderBadge(${it.id}, this.value)">
                  ${STATUS_OPTIONS.map(s => `<option value="${s.value}" ${status===s.value?'selected':''}>${s.label}</option>`).join('')}
                </select>
              </div>
            </div>` : `
            <div class="item-grid">
              <div>
                <div class="field-label">匯率</div>
                <div class="field-value">${it.rate ? `¥1 = NT$${it.rate}` : '未設定'}</div>
              </div>
              <div>
                <div class="field-label">商品狀態</div>
                <div class="field-value">${sOpt.label}</div>
              </div>
            </div>`}
          </div>`;
        }).join('')}

        <div class="order-footer-section">
          ${isEditing ? `
          <div class="footer-grid">
            <div>
              <div class="field-label">運費 NT$</div>
              <input type="number" value="${editingCustomer.shipping||''}" placeholder="0"
                oninput="editingCustomer.shipping = parseFloat(this.value)||0; rerenderTotal(${c.id})">
            </div>
            <div>
              <div class="field-label">其他加價 NT$</div>
              <input type="number" value="${editingCustomer.extra||''}" placeholder="0"
                oninput="editingCustomer.extra = parseFloat(this.value)||0; rerenderTotal(${c.id})">
            </div>
            <div>
              <div class="field-label">優惠折扣 NT$</div>
              <input type="number" value="${editingCustomer.discount||''}" placeholder="0"
                oninput="editingCustomer.discount = parseFloat(this.value)||0; rerenderTotal(${c.id})">
            </div>
            <div>
              <div class="field-label">備註</div>
              <input type="text" value="${esc(editingCustomer.note||'')}" placeholder="備註"
                oninput="editingCustomer.note = this.value">
            </div>
          </div>` : `
          <div class="footer-grid">
            <div>
              <div class="field-label">運費</div>
              <div class="field-value">NT$${Number(c.shipping||0).toLocaleString()}</div>
            </div>
            <div>
              <div class="field-label">其他加價</div>
              <div class="field-value">NT$${Number(c.extra||0).toLocaleString()}</div>
            </div>
            <div>
              <div class="field-label">優惠折扣</div>
              <div class="field-value">${Number(c.discount||0)>0?'- NT$'+Number(c.discount).toLocaleString():'-'}</div>
            </div>
            <div>
              <div class="field-label">備註</div>
              <div class="field-value">${esc(c.note||'-')}</div>
            </div>
          </div>`}

          <div class="total-row">
            <div style="font-weight:700;font-size:15px;color:#1A1A2E">
              應付總金額：<span style="color:#E8A87C" id="total-${c.id}">NT$${Math.round(total).toLocaleString()}</span>
            </div>
            <div style="display:flex;gap:8px;align-items:center">
              ${isEditing
                ? `<button class="btn-cancel" onclick="cancelEdit()">取消</button>
                   <button class="btn-save" id="save-btn-${c.id}" onclick="saveEdit(${c.id})">💾 儲存</button>`
                : `<button class="btn-delete" onclick="deleteOrder(${c.id})">🗑 刪除</button>
                   <button class="btn-edit" onclick="startEdit(${c.id})">✏️ 修改</button>`
              }
            </div>
          </div>
        </div>
      </div>` : ''}
    </div>`;
  }).join('');
}

function rerenderTotal(customerId) {
  const c = allCustomers.find(c => c.id === customerId);
  const items = getCustomerItems(customerId);
  const mergedItems = items.map(it => ({ ...it, ...(editingItems[it.id]||{}) }));
  const total = calcTotal(
    { ...c, ...editingCustomer },
    mergedItems
  );
  const el = document.getElementById(`total-${customerId}`);
  if (el) el.textContent = `NT$${Math.round(total).toLocaleString()}`;
}

function rerenderBadge(itemId, status) {
  // badge updates via status-badge span if needed
}

function toggleExpand(id) {
  if (editingOrder === id) return; // 編輯中不能收起
  expanded = expanded === id ? null : id;
  if (expanded === id && editingOrder !== id) editingOrder = null;
  renderOrders();
}

function renderPicking() {
  // Group by customer (nickname)
  const groups = {};
  allItems.forEach(it => {
    const c = allCustomers.find(c => c.id === it.customer_id);
    const key = c?.nickname || '未知';
    if (!groups[key]) groups[key] = { customer: c, items: [] };
    groups[key].items.push(it);
  });
  const container = document.getElementById('picking-list');
  const names = Object.keys(groups);
  if (!names.length) { container.innerHTML = '<div class="empty">尚無訂單</div>'; return; }
  container.innerHTML = names.map(name => {
    const { customer: c, items } = groups[name];
    const totalQty = items.reduce((s, it) => s + it.qty, 0);
    return `<div class="picking-card">
      <div class="picking-header">
        <div style="display:flex;align-items:center;gap:10px">
          <div style="width:32px;height:32px;border-radius:50%;background:#E8A87C;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#1A1A2E">${esc(name.charAt(0).toUpperCase())}</div>
          <div>
            <span style="color:#fff;font-weight:700;font-size:15px">${esc(name)}</span>
            <div style="color:#A0A0B8;font-size:11px;margin-top:2px">${esc(c?.order_no||'')}　${c?.created_at?.slice(0,10)||''}</div>
          </div>
        </div>
        <span style="color:#E8A87C;font-size:12px;font-weight:600">共 ${totalQty} 件</span>
      </div>
      ${items.map(it => {
        const sOpt = getStatusOpt(it.status);
        return `<div class="picking-item">
          ${it.image_url ? `<img src="${esc(it.image_url)}" style="width:64px;height:64px;object-fit:cover;border-radius:8px;flex-shrink:0">` : '<div style="width:64px;height:64px;background:#F0EDEA;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#CCC;flex-shrink:0">無圖</div>'}
          <div style="flex:1">
            <div style="font-weight:600;color:#1A1A2E;font-size:14px">${esc(it.name)}</div>
            <div style="font-size:12px;color:#6B6B80;margin-top:2px">
              ${it.size?esc(it.size)+'　':''}數量：${it.qty}
              ${it.vendor?`　廠商：<b>${esc(it.vendor)}</b>`:''}
            </div>
            <span class="status-badge" style="background:${sOpt.bg};color:${sOpt.color}">${sOpt.label}</span>
          </div>
          <div class="qty-badge">
            <div style="font-size:10px;color:#A0A0B8">數量</div>
            <div style="font-weight:700;font-size:18px;color:#1A1A2E">${it.qty}</div>
          </div>
        </div>`;
      }).join('')}
    </div>`;
  }).join('');
}

function renderShipping() {
  const container = document.getElementById('shipping-list');
  if (!allCustomers.length) { container.innerHTML = '<div class="empty">尚無訂單</div>'; return; }

  // Group by nickname
  const groups = {};
  allCustomers.forEach(c => {
    const key = c.nickname;
    if (!groups[key]) groups[key] = { customers: [], items: [] };
    groups[key].customers.push(c);
    groups[key].items.push(...getCustomerItems(c.id));
  });

  const names = Object.keys(groups);
  container.innerHTML = names.map(name => {
    const { customers, items } = groups[name];
    const totalQty = items.reduce((s, it) => s + it.qty, 0);
    // Sum up shipping/extra from all customers in group
    const totalShipping = customers.reduce((s, c) => s + (Number(c.shipping)||0), 0);
    const totalExtra = customers.reduce((s, c) => s + (Number(c.extra)||0), 0);
    const totalDiscount = customers.reduce((s, c) => s + (Number(c.discount)||0), 0);
    const itemsTwd = items.reduce((s, it) => {
      if (it.status === 'outofstock') return s;
      const twd = (it.price_twd && it.price_twd > 0) ? it.price_twd : (it.rate ? it.price_jpy * it.rate : 0);
      return s + twd * it.qty;
    }, 0);
    const grandTotal = itemsTwd + totalShipping + totalExtra - totalDiscount;
    const orderNos = customers.map(c => c.order_no).join('、');

    return `<div class="shipping-card" data-name="${esc(name)}">
      <div class="shipping-header">
        <div style="display:flex;align-items:center;gap:10px">
          <input type="checkbox" class="ship-check" data-name="${esc(name)}" style="width:18px;height:18px;accent-color:#E8A87C;cursor:pointer">
          <div class="avatar">${esc(name.charAt(0))}</div>
          <div>
            <div style="color:#fff;font-weight:700;font-size:15px">${esc(name)}</div>
            <div style="color:#A0A0B8;font-size:11px">${esc(orderNos)}</div>
          </div>
        </div>
        <span style="color:#E8A87C;font-size:12px;font-weight:600">${totalQty} 件</span>
      </div>
      ${items.map((it, i) => {
        const twd = it.rate ? Math.round(it.price_jpy * it.rate * it.qty) : 0;
        const sOpt = getStatusOpt(it.status);
        return `<div class="shipping-item" style="background:${i%2===0?'#fff':'#FAFAF8'}">
          ${it.image_url ? `<img src="${esc(it.image_url)}" style="width:72px;height:72px;object-fit:cover;border-radius:8px;flex-shrink:0">` : '<div style="width:72px;height:72px;background:#F0EDEA;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#CCC;flex-shrink:0">無圖</div>'}
          <div style="flex:1">
            <div style="font-weight:700;color:${it.status==='outofstock'?'#D64045':'#1A1A2E'};font-size:14px;margin-bottom:4px">${esc(it.name)}${it.status==='outofstock'?' （斷貨）':''}</div>
            <div style="font-size:12px;color:#6B6B80">
              ${it.size?esc(it.size)+'　':''}數量：${it.qty}
              ${it.vendor?`　廠商：${esc(it.vendor)}`:''}
            </div>
            <span class="status-badge" style="background:${sOpt.bg};color:${sOpt.color}">${sOpt.label}</span>
          </div>
          ${it.status==='outofstock' ? '<div style="color:#D64045;font-size:13px;font-weight:600;flex-shrink:0">不計費</div>' : twd > 0 ? `<div style="font-weight:700;color:#1A1A2E;font-size:14px;flex-shrink:0">NT$${twd.toLocaleString()}</div>` : ''}
        </div>`;
      }).join('')}
      <div class="shipping-footer">
        ${itemsTwd>0?`<div style="display:flex;justify-content:space-between;font-size:13px;color:#6B6B80;margin-bottom:4px"><span>商品金額</span><span>NT$${Math.round(itemsTwd).toLocaleString()}</span></div>`:''}
        ${totalShipping>0?`<div style="display:flex;justify-content:space-between;font-size:13px;color:#6B6B80;margin-bottom:4px"><span>運費</span><span>NT$${totalShipping.toLocaleString()}</span></div>`:''}
        ${totalExtra>0?`<div style="display:flex;justify-content:space-between;font-size:13px;color:#6B6B80;margin-bottom:4px"><span>其他加價</span><span>NT$${totalExtra.toLocaleString()}</span></div>`:''}
        <div style="display:flex;justify-content:space-between;font-weight:700;font-size:16px;color:#1A1A2E;border-top:1px solid #E8E4DF;padding-top:10px;margin-top:6px">
          <span>應付總金額</span>
          <span style="color:#E8A87C">NT$${Math.round(grandTotal).toLocaleString()}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

function printPicking() {
  document.body.classList.add('print-picking');
  document.body.classList.remove('print-shipping');
  window.print();
  document.body.classList.remove('print-picking');
}

function printShipping() {
  const checked = [...document.querySelectorAll('.ship-check:checked')].map(cb => cb.dataset.name);
  if (!checked.length) { alert('請先勾選要列印的客人！'); return; }
  document.querySelectorAll('.shipping-card').forEach(card => {
    card.style.display = checked.includes(card.dataset.name) ? 'block' : 'none';
  });
  document.body.classList.add('print-shipping');
  document.body.classList.remove('print-picking');
  window.print();
  document.body.classList.remove('print-shipping');
  document.querySelectorAll('.shipping-card').forEach(card => card.style.display = '');
}

function switchTab(tab) {
  ['orders','picking','shipping'].forEach(t => {
    document.getElementById(t+'-tab').style.display = t === tab ? 'block' : 'none';
  });
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    btn.classList.toggle('active', ['orders','picking','shipping'][i] === tab);
  });
}

function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

loadAll();
sb.channel('realtime-changes')
  .on('postgres_changes', { event: '*', schema: 'public', table: 'customers' }, () => { if (!editingOrder) loadAll(); })
  .on('postgres_changes', { event: '*', schema: 'public', table: 'order_items' }, () => { if (!editingOrder) loadAll(); })
  .subscribe();
</script>
